interface:
  display_name: "Grix Egg"
  short_description: "One-command Hermes agent incubation, including empty-agent bootstrap."
  default_prompt: |
    Use $grix-egg to incubate a Hermes agent in one command.

    Capabilities: create a remote Grix API agent, bind a local Hermes profile, inherit LLM keys, write SOUL.md when provided, start gateway, run acceptance when probe settings are provided, and resume from checkpoints.

    Empty-agent bootstrap:
      node scripts/bootstrap.js --install-id <ID> --agent-name <NAME> --json

    With SOUL content:
      node scripts/bootstrap.js --install-id <ID> --agent-name <NAME> --soul-content "personality text" --status-target <SESSION_ID> --json

    Acceptance testing:
      node scripts/bootstrap.js --install-id <ID> --agent-name <NAME> --probe-message "who are you" --expected-substring "I am" --json

    Required: --install-id and --agent-name.

    Decision rules:
    1. Use node scripts/bootstrap.js ... --json as the main entry.
    2. Default route is create_new, with WS/HTTP selected automatically.
    3. Existing-agent binding uses --route existing with --bind-json <FILE>.
    4. Checkpoint resume uses --resume with the same --install-id.

    Profile names match [a-z0-9][a-z0-9_-]{0,63}; --profile-name can override --agent-name.

    Route: --route create_new or existing.

    Path auto-detection: WS with GRIX_ENDPOINT/GRIX_AGENT_ID/GRIX_API_KEY; HTTP with --access-token; existing with explicit credentials.

policy:
  allow_implicit_invocation: true
