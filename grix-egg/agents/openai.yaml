interface:
  display_name: "Grix Egg"
  short_description: "Orchestrate Hermes Grix installation with automatic WS/HTTP routing."
  default_prompt: "Use $grix-egg to orchestrate Hermes-side Grix installation. Automatically routes to $grix-admin (WS) when GRIX_ENDPOINT/GRIX_AGENT_ID/GRIX_API_KEY are configured, or $grix-register (HTTP) otherwise. Prefer WS when available."

policy:
  allow_implicit_invocation: true
