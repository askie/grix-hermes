interface:
  display_name: "Grix Egg"
  short_description: "One-command agent incubation with auto-detection and resume."
  default_prompt: "Use $grix-egg to incubate a new agent. Run `node scripts/bootstrap.js --install-id <ID> --agent-name <NAME> --json`. On failure, read the step/suggestion in the error and retry with --resume."

policy:
  allow_implicit_invocation: true
