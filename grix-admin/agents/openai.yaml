interface:
  display_name: "Grix Admin"
  short_description: "Low-level WS admin for remote Grix agents/categories. Use grix-egg for full Hermes agent bootstrap."
  default_prompt: "Use $grix-admin only for low-level Grix WS administration: remote API agent creation, category management, status checks, or explicit binding of already-known credentials. Do not use it to bootstrap a new Hermes agent with install/SOUL/gateway/acceptance; use $grix-egg for that full flow."

policy:
  allow_implicit_invocation: true
